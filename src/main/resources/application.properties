spring.application.name=KANAN-TUX-BACKEND

# ===============================
# SERVIDOR
# ===============================
server.port=8080

# ===============================
# POSTGRESQL
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kanan_tux_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA
# ===============================
jwt.secret=${JWT_SECRET:c2VjcmV0LWtleS1kZWZpbmlkYS1wYXJhLWthbmFuLXR1eC1iYWNrZW5kLTIwMjY=}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# SECURITY (Temporal)
# ===============================
spring.security.user.name=admin
spring.security.user.password=admin

# ===============================
# MAIL (Gmail SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:credu.1406@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true